name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  # Memaksa GitHub Actions menggunakan Node.js 24 sesuai saran peringatan
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        # Gunakan versi terbaru (cek jika v5 sudah stabil di tahun 2026)
        uses: actions/checkout@v5

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v5
        with:
          node-version: 24 # Langsung gunakan Node 24 untuk build project kamu
          cache: "npm"

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build:gh
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4 # Action ini biasanya forward-compatible
        with:
          folder: dist
          branch: gh-pages
